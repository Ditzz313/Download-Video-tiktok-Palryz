<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Downloader By PalRyz</title><style>
*{box-sizing:border-box;font-family:Arial;}
body{
margin:0;
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}
.container{
width:420px;
background:#1e293b;
padding:25px;
border-radius:16px;
box-shadow:0 10px 40px rgba(0,0,0,0.6);
text-align:center;
}
.logo{width:70px;margin-bottom:10px;border-radius:20px;}
.creator{font-size:12px;color:#94a3b8;margin-bottom:10px;}
input{
width:100%;padding:12px;border-radius:10px;border:none;margin-top:10px;font-size:15px;
}
button{
width:100%;margin-top:10px;padding:12px;border:none;border-radius:10px;
background:#22c55e;color:white;font-size:16px;cursor:pointer;
}
button:hover{background:#16a34a;}
.loader{
margin:15px auto;border:4px solid #334155;border-top:4px solid #22c55e;
border-radius:50%;width:35px;height:35px;animation:spin 1s linear infinite;display:none;
}
@keyframes spin{100%{transform:rotate(360deg)}}
video{width:100%;border-radius:12px;margin-top:15px;}
.download button{background:#334155;margin-top:8px;}
.download button:hover{background:#475569;}
.caption{font-size:14px;margin-top:10px;color:#cbd5f5;}
.gallery img{width:100%;margin-top:15px;border-radius:10px;}
.photoBtn{background:#2563eb;margin-top:5px;font-size:14px;}
.photoBtn:hover{background:#1d4ed8;}
.progressBox{margin-top:10px;display:none;}
.progressBar{
width:100%;height:10px;background:#334155;border-radius:10px;overflow:hidden;
}
.progress{
height:100%;width:0%;background:#22c55e;
}
.percent{font-size:12px;margin-top:5px;color:#94a3b8;}
</style></head>
<body><div class="container">
<img class="logo" src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
<h2>TikTok Downloader</h2>
<div class="creator">Created by Noval And Viona</div><input id="url" placeholder="Paste link TikTok">
<button onclick="getVideo()">Download</button><div class="loader" id="loader"></div>
<div id="result"></div><div class="progressBox" id="progressBox">
<div class="progressBar"><div class="progress" id="progress"></div></div>
<div class="percent" id="percent">0%</div>
</div></div><script>
let currentTitle = "tiktok-file";

window.onload = async function(){
try{
const text = await navigator.clipboard.readText()
if(text.includes("tiktok.com")){
document.getElementById("url").value = text
}
}catch(e){}
}

function cleanName(text){
return text.replace(/[^a-z0-9]/gi, '_').toLowerCase().substring(0,40);
}

async function getVideo(){
let url=document.getElementById("url").value
let loader=document.getElementById("loader")
let result=document.getElementById("result")

if(!url){alert("Masukkan link TikTok");return}

loader.style.display="block"
result.innerHTML=""

let api="https://tikwm.com/api/?url="+encodeURIComponent(url)

try{
let res=await fetch(api)
let data=await res.json()
loader.style.display="none"

if(!data.data){result.innerHTML="Video tidak ditemukan";return}

let video=data.data.play
let hd=data.data.hdplay || data.data.play // pakai HD, kalau gagal otomatis pakai normal
let mp3=data.data.music
let caption=data.data.title || "tiktok"

currentTitle = cleanName(caption)

let html=""
html+=`<video controls src="${video}"></video>`
html+=`<div class="caption">${caption}</div>`

html+=`
<div class="download">
<button onclick="forceDownload('${hd}','${currentTitle}-hd.mp4')">⬇ Download Video HD</button>
<button onclick="forceDownload('${video}','${currentTitle}.mp4')">⬇ Download Video</button>
<button onclick="forceDownload('${mp3}','${currentTitle}.mp3')">⬇ Download MP3</button>
</div>`

if(data.data.images){
html+=`<h3>Foto TikTok</h3><div class="gallery">`
data.data.images.forEach((img,i)=>{
html+=`
<img src="${img}">
<button class="photoBtn" onclick="forceDownload('${img}','${currentTitle}-${i}.jpg')">⬇ Download Foto</button>`
})
html+=`</div>`
}

result.innerHTML=html

}catch{
loader.style.display="none"
result.innerHTML="Error mengambil video"
}
}

async function forceDownload(url, filename){
const progressBox = document.getElementById("progressBox")
const progress = document.getElementById("progress")
const percent = document.getElementById("percent")

progressBox.style.display = "block"
progress.style.width = "0%"
percent.innerText = "0%"

try{
const res = await fetch(url)
const reader = res.body.getReader()
const contentLength = +res.headers.get('Content-Length')
let receivedLength = 0
let chunks = []

while(true){
const {done, value} = await reader.read()
if(done) break
chunks.push(value)
receivedLength += value.length

if(contentLength){
let percentNum = Math.round((receivedLength / contentLength) * 100)
progress.style.width = percentNum + "%"
percent.innerText = percentNum + "%"
}
}

let blob = new Blob(chunks)
let link = document.createElement("a")
link.href = URL.createObjectURL(blob)
link.download = filename
link.click()

progress.style.width = "100%"
percent.innerText = "Selesai"

setTimeout(()=>{
progressBox.style.display = "none"
},2000)

}catch(e){
alert("Gagal download")
progressBox.style.display = "none"
}
}
</script></body>
</html>
