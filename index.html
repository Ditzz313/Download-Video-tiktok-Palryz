<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TikTok Downloader Ultra UI</title><style>
*{box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{margin:0;background: radial-gradient(circle at top,#0f172a,#020617);color:white;min-height:100vh;overflow-x:hidden}

/* MENU */
.menu-btn{position:fixed;top:20px;left:20px;font-size:24px;cursor:pointer;z-index:10}

.overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  backdrop-filter: blur(5px);
  opacity:0;pointer-events:none;transition:.3s;
}
.overlay.active{opacity:1;pointer-events:auto}

.sidebar{
  position:fixed;top:0;left:-270px;width:270px;height:100%;
  background:#020617;padding:20px;
  transition:.4s cubic-bezier(.77,0,.18,1);
  box-shadow:20px 0 60px rgba(0,0,0,.6);
  z-index:20;
}
.sidebar.active{left:0}

.sidebar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.close-btn{font-size:20px;cursor:pointer}

.menu-link{
  display:flex;align-items:center;gap:10px;
  background:#1e293b;padding:10px;border-radius:10px;
  margin-top:10px;cursor:pointer;text-decoration:none;color:white;
}
.menu-link img{width:20px;height:20px}

.history{margin-top:15px;background:#020617;padding:10px;border-radius:12px;max-height:200px;overflow:auto}
.history h4{margin:5px 0 8px;font-size:13px;color:#94a3b8}
.history-item{font-size:12px;padding:6px;border-bottom:1px solid #1e293b}

.container{
  width:100%;max-width:420px;
  margin:80px auto;
  padding:20px;
}
.card{
  background:rgba(30,41,59,0.7);
  backdrop-filter: blur(18px);
  padding:20px;border-radius:20px;
  box-shadow:0 25px 70px rgba(0,0,0,0.8);
  text-align:center;
}

.logo{width:70px;border-radius:18px;margin-bottom:10px}

input{
  width:100%;padding:13px;border-radius:14px;border:none;margin-top:10px;font-size:15px;background:#020617;color:white;outline:none;
}

.btn{
  width:100%;margin-top:10px;padding:14px;border:none;border-radius:14px;font-size:16px;cursor:pointer;
  background:linear-gradient(135deg,#3b82f6,#2563eb);
  color:white;transition:.3s;
}
.btn.active{background:linear-gradient(135deg,#22c55e,#16a34a)}
.btn:active{transform:scale(.97)}

.loader{margin:15px auto;border:4px solid #334155;border-top:4px solid #22c55e;border-radius:50%;width:35px;height:35px;animation:spin 1s linear infinite;display:none}
@keyframes spin{100%{transform:rotate(360deg)}}

video{width:100%;border-radius:15px;margin-top:15px}
.caption{font-size:14px;margin-top:10px;color:#cbd5f5}

.progressBox{margin-top:10px;display:none}
.progressBar{width:100%;height:10px;background:#334155;border-radius:10px;overflow:hidden}
.progress{height:100%;width:0%;background:linear-gradient(90deg,#22c55e,#4ade80);transition:.2s}
.percent{font-size:12px;margin-top:5px;color:#94a3b8}
</style></head><body><div class="menu-btn" onclick="toggleMenu()">☰</div>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div><div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h3>Menu</h3>
    <div class="close-btn" onclick="toggleMenu()">✖</div>
  </div>  <!-- OWNER SOCIAL -->  <a class="menu-link" href="https://whatsapp.com/channel/0029Vb8P2VL35fLnrptEhd0f" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png"> WhatsApp Owner
  </a>
  <a class="menu-link" href="https://www.instagram.com/palryzz744?igsh=Mzh2cmxkMG9nbWp2" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"> Instagram Owner
  </a>  <a class="menu-link" href="https://tiktok.com/@novalryz" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png"> TikTok Owner
  </a>  <div class="menu-link" onclick="clearHistory()">🗑 Hapus Riwayat</div>  <div class="history">
    <h4>📥 Riwayat Download</h4>
    <div id="historyList"></div>
  </div>
</div><div class="container">
<div class="card">
<img class="logo" src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
<h2>TikTok Downloader</h2><input id="url" placeholder="Paste link TikTok disini...">
<button class="btn" id="mainBtn" onclick="handleClick()">🚀 Download</button><div class="loader" id="loader"></div>
<div id="result"></div><div class="progressBox" id="progressBox">
<div class="progressBar"><div class="progress" id="progress"></div></div>
<div class="percent" id="percent">0%</div>
</div>
</div>
</div><script>
let currentTitle = "tiktok-file";

function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active")
  document.getElementById("overlay").classList.toggle("active")
}

function handleClick(){
  let btn=document.getElementById("mainBtn")
  btn.classList.toggle("active")
  getVideo()
}

function saveHistory(name){
  let data=JSON.parse(localStorage.getItem("tt_history")||"[]")
  data.unshift(name)
  if(data.length>10)data.pop()
  localStorage.setItem("tt_history",JSON.stringify(data))
  loadHistory()
}

function loadHistory(){
  let data=JSON.parse(localStorage.getItem("tt_history")||"[]")
  let box=document.getElementById("historyList")
  box.innerHTML=data.map(i=>`<div class='history-item'>${i}</div>`).join("")
}

function clearHistory(){
  localStorage.removeItem("tt_history")
  loadHistory()
}

window.onload = loadHistory

function cleanName(text){return text.replace(/[^a-z0-9]/gi,'_').toLowerCase().substring(0,40)}

async function getVideo(){
  let url=document.getElementById("url").value
  let loader=document.getElementById("loader")
  let result=document.getElementById("result")

  if(!url){alert("Masukkan link TikTok");return}

  loader.style.display="block"
  result.innerHTML=""

  let api="https://tikwm.com/api/?url="+encodeURIComponent(url)

  try{
    let res=await fetch(api)
    let data=await res.json()
    loader.style.display="none"

    if(!data.data){result.innerHTML="Video tidak ditemukan";return}

    let video=data.data.play
    let hd=data.data.hdplay || data.data.play
    let mp3=data.data.music
    let caption=data.data.title || "tiktok"

    currentTitle = cleanName(caption)

    let html=""
    html+=`<video controls src="${video}"></video>`
    html+=`<div class="caption">${caption}</div>`

    html+=`
    <button class='btn' onclick="forceDownload('${hd}','${currentTitle}-hd.mp4')">⬇ Download VT HD</button>
    <button class='btn' onclick="forceDownload('${video}','${currentTitle}.mp4')">⬇ Download VT Normal</button>
    <button class='btn' onclick="forceDownload('${mp3}','${currentTitle}.mp3')">🎵 Download MP3</button>`

    /* FOTO SUPPORT */
    if(data.data.images){
      html+=`<h3>📸 Foto TikTok</h3>`
      data.data.images.forEach((img,i)=>{
        html+=`
        <img src="${img}" style="width:100%;border-radius:12px;margin-top:10px">
        <button class='btn' onclick="forceDownload('${img}','${currentTitle}-${i}.jpg')">⬇ Download Image ${i+1}</button>`
      })
    }

    result.innerHTML=html

  }catch{
    loader.style.display="none"
    result.innerHTML="Error mengambil video"
  }
}

async function forceDownload(url, filename){
  const progressBox=document.getElementById("progressBox")
  const progress=document.getElementById("progress")
  const percent=document.getElementById("percent")

  progressBox.style.display="block"

  try{
    const res=await fetch(url)
    const blob=await res.blob()

    let link=document.createElement("a")
    link.href=URL.createObjectURL(blob)
    link.download=filename
    link.click()

    saveHistory(filename)

    progress.style.width="100%"
    percent.innerText="Selesai"

    setTimeout(()=>{progressBox.style.display="none"},1500)

  }catch(e){
    alert("Gagal download")
    progressBox.style.display="none"
  }
}
</script></body>
</html>
